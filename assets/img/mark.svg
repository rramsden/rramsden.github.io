<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="KISS">
  <style>
    .bg    { fill: #e9e8e3; }
    .brand { fill: #6a3a2a; }
    .rule  { stroke: #6a3a2a; }
    text {
      font-family: "Iowan Old Style","Charter","Palatino Linotype",Palatino,"Book Antiqua",Georgia,serif;
    }
  </style>
  <rect width="64" height="64" rx="12" class="bg"/>
  <circle cx="32" cy="32" r="26" fill="none" class="rule" stroke-width="2.5"/>
  <text x="32" y="33" text-anchor="middle" dominant-baseline="central"
        font-size="36" font-weight="700" class="brand">K</text>
</svg>
